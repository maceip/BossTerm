<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BossTerm</title>

    <!-- 4A: Document-Isolation-Policy — enables SharedArrayBuffer without COOP/COEP -->
    <!-- For full effect, set this as a server response header:
         Document-Isolation-Policy: isolate-and-require-corp -->
    <meta http-equiv="origin-trial" content="">

    <!-- PWA manifest with Window Controls Overlay (4C) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 4C: Window Controls Overlay — use reclaimed title bar area */
        .titlebar-status {
            display: none;
            position: fixed;
            top: env(titlebar-area-y, 0);
            left: env(titlebar-area-x, 0);
            width: env(titlebar-area-width, 100%);
            height: env(titlebar-area-height, 33px);
            background: #2d2d2d;
            color: #80cbc4;
            font-size: 11px;
            padding: 0 12px;
            align-items: center;
            justify-content: space-between;
            z-index: 9999;
            -webkit-app-region: drag;
            app-region: drag;
        }

        .titlebar-status .controls {
            -webkit-app-region: no-drag;
            app-region: no-drag;
        }

        /* Show titlebar status only when WCO is active */
        @media (display-mode: window-controls-overlay) {
            .titlebar-status {
                display: flex;
            }
            #bosstermCanvas {
                margin-top: env(titlebar-area-height, 33px);
            }
        }

        /* 4D: View Transitions — smooth panel switching */
        .panel-container {
            view-transition-name: main-panel;
        }

        ::view-transition-old(main-panel),
        ::view-transition-new(main-panel) {
            animation-duration: 0.2s;
            animation-timing-function: ease-in-out;
        }

        ::view-transition-old(main-panel) {
            animation-name: slide-out;
        }

        ::view-transition-new(main-panel) {
            animation-name: slide-in;
        }

        @keyframes slide-out {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(-20px); opacity: 0; }
        }

        @keyframes slide-in {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Canvas fills viewport */
        #bosstermCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Loading indicator */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #121212;
            color: #80cbc4;
            font-size: 14px;
            z-index: 10000;
            transition: opacity 0.3s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #333;
            border-top-color: #80cbc4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-status {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <!-- 4C: Window Controls Overlay status bar -->
    <div class="titlebar-status" id="titlebar">
        <span id="titlebar-title">BossTerm</span>
        <div class="controls">
            <span id="titlebar-status"></span>
        </div>
    </div>

    <!-- Loading screen -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div>Loading BossTerm...</div>
        <div class="loading-status" id="loading-status">Initializing WebAssembly</div>
    </div>

    <!-- Compose Canvas target -->
    <canvas id="bosstermCanvas"></canvas>

    <script>
        // 4C: Window Controls Overlay geometry tracking
        if ('windowControlsOverlay' in navigator) {
            navigator.windowControlsOverlay.addEventListener('geometrychange', function(e) {
                var rect = e.titlebarAreaRect;
                window.__wcoGeometry = {
                    x: rect.x, y: rect.y,
                    width: rect.width, height: rect.height
                };
                // Update CSS custom properties
                document.documentElement.style.setProperty('--titlebar-height', rect.height + 'px');
            });
        }

        // 4E: Navigation API — handle browser back/forward
        if ('navigation' in window) {
            window.navigation.addEventListener('navigate', function(event) {
                var url = new URL(event.destination.url);
                window.__navDestination = url.pathname + url.hash;
                // Intercept navigation to keep it in-app
                if (url.origin === location.origin) {
                    event.intercept({
                        handler: function() {
                            // Kotlin-side will handle the view switch
                        }
                    });
                }
            });
        }

        // 4H: Request persistent storage on load
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(function(granted) {
                if (granted) {
                    console.log('[BossTerm] Persistent storage granted');
                }
            });
        }

        // Hide loading screen when Wasm is ready
        window.addEventListener('load', function() {
            document.getElementById('loading-status').textContent = 'Compiling WebAssembly...';
        });

        // The Compose/Wasm runtime will call into the canvas automatically
        // Loading screen hides when first frame renders
        var loadingHidden = false;
        function hideLoading() {
            if (!loadingHidden) {
                loadingHidden = true;
                var el = document.getElementById('loading');
                if (el) el.classList.add('hidden');
                setTimeout(function() { if (el) el.remove(); }, 300);
            }
        }

        // Auto-hide loading after Wasm module loads (fallback timeout)
        setTimeout(hideLoading, 8000);

        // Observe canvas for first paint
        var observer = new MutationObserver(function() {
            hideLoading();
            observer.disconnect();
        });
        var canvas = document.getElementById('bosstermCanvas');
        if (canvas) {
            observer.observe(canvas, { attributes: true, childList: true });
        }
    </script>

    <!-- Kotlin/Wasm output -->
    <script src="bossterm.js"></script>
</body>
</html>
